name: Deploy Omeka via Git Tag

on:
  push:
    tags:
      - 'v*.*.*-*'  # e.g., v1.1.1-dev

jobs:
  parse-env:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.setenv.outputs.env }}
    steps:
      - name: Parse environment from tag
        id: setenv
        run: |
          ENV=$(echo '${{ github.ref_name }}' | grep -oE '(dev|test|stage|prod)$')
          if [ -z "$ENV" ]; then
            echo "Tag must end in -dev, -test, -stage, or -prod"
            exit 1
          fi
          echo "env=$ENV" >> $GITHUB_OUTPUT

  deploy:
    needs: parse-env
    runs-on: self-hosted
    environment: ${{ needs.parse-env.outputs.env_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Package artifact
        run: |
          mkdir -p modules/UnitedSearch
          rsync -av --exclude=modules ./ modules/UnitedSearch/
          zip -r artifact.zip modules/

      - name: Upload artifact to S3
        run: |
          ENV=${{ needs.parse-env.outputs.env_name }}
          TAG=${{ github.ref_name }}
          aws s3 cp artifact.zip s3://${{ secrets.S3_BUCKET_NAME }}/$ENV/artifacts/$TAG/artifact.zip

      - name: Trigger deploy via SSM to target EC2
        run: |
          ENV=${{ needs.parse-env.outputs.env_name }}
          TAG=${{ github.ref_name }}
          INSTANCE_ID=${{ secrets.INSTANCE_ID }}

          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --comment "Remote Omeka Deployment" \
            --parameters "commands=[
              \"aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/$ENV/artifacts/$TAG/artifact.zip /tmp/artifact.zip\",
              \"unzip -o /tmp/artifact.zip -d /tmp/deployed\",
              \"chmod +x /tmp/deployed/modules/UnitedSearch/.github/workflows/deploy.sh\",
              \"/tmp/deployed/modules/UnitedSearch/.github/workflows/deploy.sh $ENV $TAG\"
            ]" \
            --region us-east-1
